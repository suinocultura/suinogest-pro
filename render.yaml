services:
  - type: web
    name: suinogest-pro
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/suinogest.db
    disk:
      name: suinogest-data
      mountPath: /var/data
      sizeGB: 1
