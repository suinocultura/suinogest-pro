{% extends 'base.html' %}
{% block content %}
<section class="panel form-panel">
  <h2>Lançamento de ração</h2>
  <form method="post">
    <label>Data<input type="date" name="log_date" value="{{ today }}" required></label>
    <label>Tipo de ração<input name="feed_type" required></label>
    <label>Quantidade (kg)<input type="number" step="0.01" name="quantity_kg" required></label>
    <label>Custo<input type="number" step="0.01" name="cost" required></label>
    <button class="btn" type="submit">Registrar</button>
  </form>
</section>
<section class="panel">
  <h2>Consumo de ração</h2>
  <table>
    <thead><tr><th>Data</th><th>Ração</th><th>Kg</th><th>Custo</th></tr></thead>
    <tbody>
      {% for l in logs %}
      <tr><td>{{ l.log_date }}</td><td>{{ l.feed_type }}</td><td>{{ l.quantity_kg }}</td><td>R$ {{ '%.2f'|format(l.cost) }}</td></tr>
      {% else %}<tr><td colspan="4">Sem lançamentos.</td></tr>{% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
