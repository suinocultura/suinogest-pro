{% extends 'base.html' %}
{% block content %}
<section class="panel form-panel">
  <h2>Evento sanitário</h2>
  <form method="post">
    <label>Suíno
      <select name="pig_id" required>
        {% for p in pigs %}<option value="{{ p.id }}">{{ p.tag }}</option>{% endfor %}
      </select>
    </label>
    <label>Data<input type="date" name="event_date" value="{{ today }}" required></label>
    <label>Tipo<input name="event_type" placeholder="Vacina, Vermífugo, Tratamento" required></label>
    <label>Descrição<input name="description" required></label>
    <label>Custo<input type="number" step="0.01" name="cost" required></label>
    <button class="btn" type="submit">Registrar</button>
  </form>
</section>

<section class="panel">
  <h2>Histórico sanitário</h2>
  <table>
    <thead><tr><th>Data</th><th>Suíno</th><th>Tipo</th><th>Descrição</th><th>Custo</th></tr></thead>
    <tbody>
      {% for e in events %}
      <tr><td>{{ e.event_date }}</td><td>{{ e.tag }}</td><td>{{ e.event_type }}</td><td>{{ e.description }}</td><td>R$ {{ '%.2f'|format(e.cost) }}</td></tr>
      {% else %}<tr><td colspan="5">Sem eventos.</td></tr>{% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
