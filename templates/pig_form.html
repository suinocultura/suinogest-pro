{% extends 'base.html' %}
{% block content %}
<section class="panel form-panel">
  <h2>Novo suíno</h2>
  <form method="post">
    <label>Brinco<input name="tag" required></label>
    <label>Raça<input name="breed" required></label>
    <label>Sexo
      <select name="sex"><option>Macho</option><option>Fêmea</option></select>
    </label>
    <label>Nascimento<input type="date" name="birth_date" value="{{ today }}" required></label>
    <label>Peso inicial (kg)<input type="number" step="0.01" name="weight_kg" required></label>
    <label>Status
      <select name="status"><option>Ativo</option><option>Matriz</option><option>Reprodutor</option></select>
    </label>
    <label>Observações<textarea name="notes"></textarea></label>
    <button class="btn" type="submit">Salvar</button>
  </form>
</section>
{% endblock %}
